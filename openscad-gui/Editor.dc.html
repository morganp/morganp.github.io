<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#15171B;overflow:hidden;}
  *{box-sizing:border-box;}
  textarea.scad{outline:none;resize:none;}
  textarea.scad::selection{background:#3B82F655;}
  .cad-scroll::-webkit-scrollbar{width:10px;height:10px;}
  .cad-scroll::-webkit-scrollbar-thumb{background:#34393F;border-radius:6px;border:2px solid #1B1E23;}
  .cad-scroll::-webkit-scrollbar-track{background:transparent;}
  input[type=range].cad{-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:#34393F;outline:none;}
  input[type=range].cad::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:#3B82F6;border:2px solid #0E1013;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.5);}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/","three-mesh-bvh":"https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js","three-bvh-csg":"https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"}}</script>
<script type="module">
  try {
    const THREE = await import('three');
    const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
    const { TransformControls } = await import('three/addons/controls/TransformControls.js');
    window.__TransformControls = TransformControls;
    let CSG = null;
    try { CSG = await import('three-bvh-csg'); } catch (e) { console.warn('CSG unavailable, falling back to solid primitives:', e && e.message); }
    window.THREE = THREE;
    window.__OrbitControls = OrbitControls;
    window.__CSG = CSG;
    window.__threeReady = true;
    window.dispatchEvent(new Event('three-ready'));
  } catch (e) {
    console.error('three failed to load', e);
  }
</script>
</helmet>
<div style="position:fixed;inset:0;background:#15171B;color:#C7CCD4;font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;user-select:none;">

  <div ref="{{ setViewport }}" style="position:absolute;inset:0;cursor:default;"></div>

  <sc-if value="{{ notReady }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;background:#15171B;z-index:60;">
      <div style="width:34px;height:34px;border:3px solid #2A2E34;border-top-color:#3B82F6;border-radius:50%;animation:spin .8s linear infinite;"></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6B7280;letter-spacing:.06em;">initializing viewport\u2026</div>
    </div>
  </sc-if>

  <div style="position:absolute;top:16px;left:16px;display:flex;align-items:center;gap:10px;z-index:30;">
    <div style="display:flex;align-items:center;gap:9px;background:rgba(27,30,35,.82);backdrop-filter:blur(12px);border:1px solid #2C3037;border-radius:11px;padding:8px 13px;box-shadow:0 8px 26px rgba(0,0,0,.4);">
      <div style="width:17px;height:17px;border-radius:5px;background:linear-gradient(135deg,#3B82F6,#2563EB);box-shadow:0 0 0 1px #2C3037, inset 0 1px 0 rgba(255,255,255,.25);"></div>
      <span style="font-weight:600;letter-spacing:.01em;color:#E6E9EE;">SCAD Studio</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#5B616B;padding:1px 6px;border:1px solid #2C3037;border-radius:5px;margin-left:1px;">v1</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;background:rgba(27,30,35,.82);backdrop-filter:blur(12px);border:1px solid #2C3037;border-radius:11px;padding:6px;box-shadow:0 8px 26px rgba(0,0,0,.4);">
      <button onClick="{{ openFile }}" style="display:flex;align-items:center;gap:7px;background:transparent;border:none;color:#C7CCD4;font:inherit;font-size:12px;padding:6px 11px;border-radius:7px;cursor:pointer;" style-hover="background:#262A30;">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4.5A1.5 1.5 0 0 1 3.5 3h2.7l1.2 1.5H12.5A1.5 1.5 0 0 1 14 6v6a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 12V4.5Z" stroke="#9AA3AE" stroke-width="1.2"/></svg>
        Open
      </button>
      <button onClick="{{ saveFile }}" style="display:flex;align-items:center;gap:7px;background:transparent;border:none;color:#C7CCD4;font:inherit;font-size:12px;padding:6px 11px;border-radius:7px;cursor:pointer;" style-hover="background:#262A30;">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0 3-3m-3 3L5 7M3 11.5v1A1.5 1.5 0 0 0 4.5 14h7a1.5 1.5 0 0 0 1.5-1.5v-1" stroke="#9AA3AE" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Save .scad
      </button>
    </div>
  </div>

  <div style="position:absolute;left:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;z-index:30;background:rgba(27,30,35,.82);backdrop-filter:blur(12px);border:1px solid #2C3037;border-radius:13px;padding:7px;box-shadow:0 10px 30px rgba(0,0,0,.45);">
    <button onClick="{{ pickSelect }}" title="Select &amp; edges (V)" style="{{ btnSelect }}">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M4 3.2 15.5 9 10.4 10.6 8.6 15.8 4 3.2Z" fill="currentColor"/></svg>
    </button>
    <div style="height:1px;background:#2C3037;margin:2px 4px;"></div>
    <button onClick="{{ addCuboid }}" title="Add cuboid (B)" style="{{ btnCuboid }}">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2.6 16.5 6v8L10 17.4 3.5 14V6L10 2.6Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M3.6 6 10 9.4 16.4 6M10 9.4v8" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" opacity=".55"/></svg>
    </button>
    <button onClick="{{ addCylinder }}" title="Add cylinder (C)" style="{{ btnCylinder }}">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><ellipse cx="10" cy="5" rx="6" ry="2.3" stroke="currentColor" stroke-width="1.3"/><path d="M4 5v10c0 1.27 2.69 2.3 6 2.3s6-1.03 6-2.3V5" stroke="currentColor" stroke-width="1.3"/></svg>
    </button>
    <div style="height:1px;background:#2C3037;margin:2px 4px;"></div>
    <button onClick="{{ pickMove }}" title="Move selected (M)" style="{{ btnMove }}">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 3v14M3 10h14M10 3 8 5.4m2-2.4 2 2.4M10 17l-2-2.4m2 2.4 2-2.4M3 10l2.4-2M3 10l2.4 2M17 10l-2.4-2m2.4 2-2.4 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button onClick="{{ deleteSelected }}" title="Delete selected (\u232b)" style="{{ btnDelete }}">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M4.5 5.5h11M8 5.5V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1.5m2 0-.6 9a1.5 1.5 0 0 1-1.5 1.4H6.6a1.5 1.5 0 0 1-1.5-1.4l-.6-9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <sc-if value="{{ hasEdge }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:35;background:rgba(24,27,31,.92);backdrop-filter:blur(14px);border:1px solid #34495F;border-radius:13px;box-shadow:0 14px 40px rgba(0,0,0,.55);padding:13px 15px;min-width:330px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;">
        <div style="display:flex;align-items:center;gap:9px;">
          <span style="width:9px;height:9px;border-radius:50%;background:#3B82F6;box-shadow:0 0 10px #3B82F6;"></span>
          <span style="font-size:12px;color:#9AA3AE;">Edge</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#E6E9EE;font-weight:500;">{{ edgeLabel }}</span>
        </div>
        <button onClick="{{ clearEdge }}" style="background:transparent;border:none;color:#6B7280;cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;" style-hover="color:#C7CCD4;">×</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:13px;">
        <button onClick="{{ setFillet }}" style="{{ filletTab }}">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 13V7a4 4 0 0 1 4-4h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Fillet
        </button>
        <button onClick="{{ setChamfer }}" style="{{ chamferTab }}">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 13V8l5-5h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Chamfer
        </button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
        <span style="font-size:11px;color:#8A9099;letter-spacing:.04em;text-transform:uppercase;">{{ sizeLabel }}</span>
        <div style="display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;">
          <input type="number" value="{{ radius }}" onChange="{{ onRadiusInput }}" step="0.5" min="0.5" style="width:52px;background:#0F1114;border:1px solid #2C3037;border-radius:6px;color:#E6E9EE;font:inherit;font-size:12px;padding:4px 6px;text-align:right;" />
          <span style="font-size:11px;color:#6B7280;">mm</span>
        </div>
      </div>
      <input type="range" class="cad" value="{{ radius }}" onInput="{{ onRadiusSlide }}" min="0.5" max="{{ radiusMax }}" step="0.5" style="width:100%;margin:2px 0 13px;" />
      <sc-if value="{{ hasApplied }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:7px;">
        <button onClick="{{ removeTreatmentBtn }}" style="flex:1;background:#23272E;border:1px solid #34393F;color:#C7CCD4;font:inherit;font-size:12px;padding:7px;border-radius:8px;cursor:pointer;" style-hover="background:#2B3036;">Remove treatment</button>
      </div>
      </sc-if>
    </div>
  </sc-if>

  <sc-if value="{{ hasShapePanel }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:34;background:rgba(24,27,31,.92);backdrop-filter:blur(14px);border:1px solid #2C3037;border-radius:13px;box-shadow:0 14px 40px rgba(0,0,0,.55);padding:13px 15px;width:344px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;">
        <div style="display:flex;align-items:center;gap:9px;">
          <span style="{{ shapeDotStyle }}"></span>
          <span style="font-size:13px;color:#E6E9EE;font-weight:500;">{{ shapePanelLabel }}</span>
        </div>
        <button onClick="{{ deselectShape }}" style="background:transparent;border:none;color:#6B7280;cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;" style-hover="color:#C7CCD4;">×</button>
      </div>

      <div style="display:flex;gap:6px;margin-bottom:14px;">
        <button onClick="{{ setGizmoMove }}" style="{{ moveTab }}">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12M8 2 6.4 3.8M8 2l1.6 1.8M8 14l-1.6-1.8M8 14l1.6-1.8M2 8l1.8-1.6M2 8l1.8 1.6M14 8l-1.8-1.6M14 8l-1.8 1.6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Move
        </button>
        <button onClick="{{ setGizmoScale }}" style="{{ scaleTab }}">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2.5" y="2.5" width="11" height="11" rx="1.2" stroke="currentColor" stroke-width="1.2"/><rect x="8.5" y="8.5" width="5" height="5" rx="0.8" fill="currentColor"/></svg>
          Resize
        </button>
      </div>

      <div style="font-size:10px;color:#8A9099;letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;">Dimensions</div>
      <sc-if value="{{ isCuboidSel }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <label style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <span style="font-size:10px;color:#6B7280;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;">X</span>
            <input type="number" value="{{ dimX }}" onChange="{{ onDimX }}" step="1" min="1" style="width:100%;background:#0F1114;border:1px solid #2C3037;border-radius:7px;color:#E6E9EE;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;" />
          </label>
          <label style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <span style="font-size:10px;color:#6B7280;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;">Y</span>
            <input type="number" value="{{ dimY }}" onChange="{{ onDimY }}" step="1" min="1" style="width:100%;background:#0F1114;border:1px solid #2C3037;border-radius:7px;color:#E6E9EE;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;" />
          </label>
          <label style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <span style="font-size:10px;color:#6B7280;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;">Z (height)</span>
            <input type="number" value="{{ dimZ }}" onChange="{{ onDimZ }}" step="1" min="1" style="width:100%;background:#0F1114;border:1px solid #2C3037;border-radius:7px;color:#E6E9EE;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;" />
          </label>
        </div>
      </sc-if>
      <sc-if value="{{ isCylinderSel }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <label style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <span style="font-size:10px;color:#6B7280;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;">⌀ diameter</span>
            <input type="number" value="{{ cylDia }}" onChange="{{ onCylDia }}" step="1" min="1" style="width:100%;background:#0F1114;border:1px solid #2C3037;border-radius:7px;color:#E6E9EE;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;" />
          </label>
          <label style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <span style="font-size:10px;color:#6B7280;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;">Z (height)</span>
            <input type="number" value="{{ cylH }}" onChange="{{ onCylH }}" step="1" min="1" style="width:100%;background:#0F1114;border:1px solid #2C3037;border-radius:7px;color:#E6E9EE;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;" />
          </label>
        </div>
      </sc-if>

      <div style="font-size:10px;color:#8A9099;letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;">Position</div>
      <div style="display:flex;gap:8px;margin-bottom:13px;">
        <label style="flex:1;display:flex;flex-direction:column;gap:4px;">
          <span style="font-size:10px;color:#6B7280;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;">X</span>
          <input type="number" value="{{ posX }}" onChange="{{ onPosX }}" step="1" style="width:100%;background:#0F1114;border:1px solid #2C3037;border-radius:7px;color:#E6E9EE;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;" />
        </label>
        <label style="flex:1;display:flex;flex-direction:column;gap:4px;">
          <span style="font-size:10px;color:#6B7280;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;">Y</span>
          <input type="number" value="{{ posY }}" onChange="{{ onPosY }}" step="1" style="width:100%;background:#0F1114;border:1px solid #2C3037;border-radius:7px;color:#E6E9EE;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;" />
        </label>
        <label style="flex:1;display:flex;flex-direction:column;gap:4px;">
          <span style="font-size:10px;color:#79AEF5;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;">Z (plane)</span>
          <input type="number" value="{{ posZ }}" onChange="{{ onPosZ }}" step="1" style="width:100%;background:#0F1114;border:1px solid #34495F;border-radius:7px;color:#E6E9EE;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;" />
        </label>
      </div>
      <button onClick="{{ placeOnFloor }}" style="width:100%;background:#23272E;border:1px solid #34393F;color:#C7CCD4;font:inherit;font-size:12px;padding:7px;border-radius:8px;cursor:pointer;" style-hover="background:#2B3036;">Rest base on floor</button>
    </div>
  </sc-if>

  <div style="position:absolute;left:16px;bottom:16px;z-index:30;width:212px;background:rgba(27,30,35,.82);backdrop-filter:blur(12px);border:1px solid #2C3037;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.45);overflow:hidden;">
    <div style="display:flex;align-items:center;gap:7px;padding:10px 13px;border-bottom:1px solid #2C3037;">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2.5 4h11M2.5 8h11M2.5 12h7" stroke="#6B7280" stroke-width="1.3" stroke-linecap="round"/></svg>
      <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#8A9099;font-weight:500;">Model Tree</span>
      <span style="margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5B616B;">{{ shapeCount }}</span>
    </div>
    <div class="cad-scroll" style="max-height:210px;overflow-y:auto;padding:6px;">
      <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ true }}">
        <div style="padding:14px 10px;text-align:center;color:#5B616B;font-size:11.5px;line-height:1.5;">No solids yet.<br/>Add a cuboid to begin.</div>
      </sc-if>
      <sc-for list="{{ shapesList }}" as="s" hint-placeholder-count="0">
        <div onClick="{{ s.onSelect }}" style="{{ s.rowStyle }}">
          <span style="display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:#23272E;flex:none;">
            <span style="{{ s.dotStyle }}"></span>
          </span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:12.5px;color:#E6E9EE;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ s.label }}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6B7280;">{{ s.meta }}</div>
          </div>
          <button onClick="{{ s.onDelete }}" style="background:transparent;border:none;color:#5B616B;cursor:pointer;padding:3px;border-radius:5px;flex:none;" style-hover="color:#EF6B6B;background:#2B2023;">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4.5 5.5h7l-.5 7.5h-6l-.5-7.5ZM6.5 5.5V4.2h3v1.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </sc-for>
    </div>
  </div>

  <div style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:25;display:flex;align-items:center;gap:0;background:rgba(27,30,35,.82);backdrop-filter:blur(12px);border:1px solid #2C3037;border-radius:9px;padding:5px 4px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8A9099;box-shadow:0 8px 24px rgba(0,0,0,.4);">
    <span style="padding:2px 11px;">{{ statusHint }}</span>
    <span style="width:1px;height:13px;background:#2C3037;"></span>
    <span style="padding:2px 11px;">$fn {{ fnVal }}</span>
    <span style="width:1px;height:13px;background:#2C3037;"></span>
    <span style="padding:2px 11px;color:#5B616B;">mm</span>
  </div>

  <div style="{{ drawerStyle }}">
    <div style="display:flex;align-items:center;gap:9px;padding:13px 14px;border-bottom:1px solid #23272E;flex:none;">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4 2.5 8 6 12M10 4l3.5 4L10 12" stroke="#6B7280" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C7CCD4;">model.scad</span>
      <span style="{{ dirtyDot }}"></span>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <button onClick="{{ runCode }}" title="Apply code to model" style="display:flex;align-items:center;gap:6px;background:#1C3251;border:1px solid #2C4D78;color:#9CC2F5;font:inherit;font-size:11.5px;padding:5px 11px;border-radius:7px;cursor:pointer;" style-hover="background:#234063;">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><path d="M3 2.2v7.6L9.5 6 3 2.2Z"/></svg>
          Run
        </button>
        <button onClick="{{ copyCode }}" title="Copy" style="display:flex;align-items:center;background:#23272E;border:1px solid #34393F;color:#9AA3AE;font:inherit;padding:5px 9px;border-radius:7px;cursor:pointer;" style-hover="color:#E6E9EE;">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5.2" y="5.2" width="7.5" height="7.5" rx="1.4" stroke="currentColor" stroke-width="1.2"/><path d="M10.5 5V4A1.5 1.5 0 0 0 9 2.5H4.5A1.5 1.5 0 0 0 3 4v4.5A1.5 1.5 0 0 0 4.5 10h.8" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
      </div>
    </div>
    <textarea ref="{{ setCodeArea }}" class="scad cad-scroll" value="{{ code }}" onChange="{{ onCodeChange }}" spellcheck="false" style="flex:1;width:100%;background:#101216;border:none;color:#CBD2DA;font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.62;padding:15px 16px;letter-spacing:.01em;tab-size:2;"></textarea>
    <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid #23272E;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#5B616B;flex:none;">
      <span style="{{ csgBadge }}">{{ csgText }}</span>
      <span style="margin-left:auto;">{{ codeMeta }}</span>
    </div>
  </div>

  <button onClick="{{ toggleDrawer }}" style="{{ drawerTab }}">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M6 4 2.5 8 6 12M10 4l3.5 4L10 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <input ref="{{ setFileInput }}" type="file" accept=".scad,.txt" onChange="{{ onFileChosen }}" style="display:none;" />
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    ready: false,
    tool: 'select',
    shapes: [],            // serializable mirror for the tree
    selectedShapeId: null,
    selectedEdge: null,    // { shapeId, edgeName, label }
    treatType: 'fillet',
    gizmoMode: 'translate',
    radius: 3,
    drawerOpen: true,
    code: '',
    csgOk: true,
    dirty: false,
    fn: 48,
  };

  // ---- non-react engine state ----
  shapes = [];             // [{id, type, label, dims, pos, treatments:{}, edges:[], group, solid, proxies:[]}]
  seq = { cuboid: 0, cylinder: 0 };

  componentDidMount() {
    this._onKey = (e) => this.onKey(e);
    window.addEventListener('keydown', this._onKey);
    if (window.__threeReady) this.initThree();
    else window.addEventListener('three-ready', () => this.initThree(), { once: true });
  }
  componentWillUnmount() {
    window.removeEventListener('keydown', this._onKey);
    if (this._raf) cancelAnimationFrame(this._raf);
  }

  setViewport = (el) => { if (el && !this._vp) { this._vp = el; if (window.__threeReady && !this._inited) this.initThree(); } };
  setCodeArea = (el) => { this._codeArea = el; };
  setFileInput = (el) => { this._fileInput = el; };

  // ============ THREE INIT ============
  initThree() {
    if (this._inited || !this._vp) return;
    const THREE = window.THREE;
    if (!THREE) return;
    this._inited = true;
    this.THREE = THREE;
    this.CSG = window.__CSG || null;

    const el = this._vp;
    const w = el.clientWidth || window.innerWidth, h = el.clientHeight || window.innerHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x15171B);
    this.scene = scene;

    const cam = new THREE.PerspectiveCamera(42, w / h, 0.5, 5000);
    cam.up.set(0, 0, 1);
    cam.position.set(78, -96, 70);
    this.cam = cam;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    el.appendChild(renderer.domElement);
    this.renderer = renderer;

    const controls = new window.__OrbitControls(cam, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.09;
    controls.target.set(0, 0, 8);
    controls.minDistance = 18;
    controls.maxDistance = 900;
    this.controls = controls;

    // transform gizmo (move / resize handles)
    const TC = window.__TransformControls;
    if (TC) {
      const tc = new TC(cam, renderer.domElement);
      tc.setSize(0.82);
      tc.setTranslationSnap(1);
      tc.setScaleSnap(0.05);
      tc.addEventListener('dragging-changed', (ev) => { this.controls.enabled = !ev.value; if (!ev.value) this.onGizmoEnd(); });
      tc.addEventListener('objectChange', () => this.onGizmoChange());
      tc.visible = false;
      scene.add(tc);
      this.tc = tc;
    }

    // lighting
    scene.add(new THREE.HemisphereLight(0xbcc6d4, 0x2b2f36, 0.85));
    const key = new THREE.DirectionalLight(0xffffff, 1.55);
    key.position.set(60, -40, 110);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    const d = 160; key.shadow.camera.left = -d; key.shadow.camera.right = d; key.shadow.camera.top = d; key.shadow.camera.bottom = -d;
    key.shadow.camera.near = 10; key.shadow.camera.far = 500; key.shadow.bias = -0.0004;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x9fb4d0, 0.5);
    fill.position.set(-80, 60, 40); scene.add(fill);

    // ground + grid (Z-up -> grid in XY plane)
    const grid = new THREE.GridHelper(600, 60, 0x2c3138, 0x21262c);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = 0;
    scene.add(grid);
    const grid2 = new THREE.GridHelper(600, 12, 0x363d45, 0x2a3037);
    grid2.rotation.x = Math.PI / 2; grid2.position.z = 0.01; scene.add(grid2);

    const groundMat = new THREE.ShadowMaterial({ opacity: 0.28 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), groundMat);
    ground.position.z = 0; ground.receiveShadow = true; scene.add(ground);

    // axes
    this.addAxes();

    // shared material + highlight helpers
    this.solidMat = new THREE.MeshStandardMaterial({ color: 0x9aa3ae, metalness: 0.18, roughness: 0.52, flatShading: false });
    this.selMat = new THREE.MeshStandardMaterial({ color: 0xa9c2e6, metalness: 0.2, roughness: 0.45, emissive: 0x14304f, emissiveIntensity: 0.6 });
    this.lineMat = new THREE.LineBasicMaterial({ color: 0x3a4048, transparent: true, opacity: 0.9 });

    this.hoverTube = null;
    this.selTube = null;
    this.raycaster = new THREE.Raycaster();
    this.raycaster.params.Line = { threshold: 1.6 };
    this.pointer = new THREE.Vector2();

    const dom = renderer.domElement;
    dom.style.touchAction = 'none';
    dom.addEventListener('pointermove', (e) => this.onPointerMove(e));
    dom.addEventListener('pointerdown', (e) => this.onPointerDown(e));
    dom.addEventListener('pointerup', (e) => this.onPointerUp(e));
    dom.addEventListener('pointerleave', () => this.setHoverEdge(null));

    window.addEventListener('resize', () => this.onResize());
    this.applyViewOffset();
    this.onResize();

    const loop = () => {
      this._raf = requestAnimationFrame(loop);
      controls.update();
      renderer.render(scene, cam);
    };
    loop();

    this.setState({ ready: true, csgOk: !!this.CSG });
    window.__editor = this;

    // seed with a cuboid so "draw a cube, highlight an edge" works immediately
    this.addCuboid();
  }

  addAxes() {
    const THREE = this.THREE;
    const mk = (a, b, c) => {
      const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(a, b, c)]);
      return new THREE.Line(g, new THREE.LineBasicMaterial({ color: (a ? 0xc56a6a : b ? 0x6ac57f : 0x6a8fc5) }));
    };
    const L = 26;
    this.scene.add(mk(L, 0, 0)); this.scene.add(mk(0, L, 0)); this.scene.add(mk(0, 0, L));
  }

  applyViewOffset() {
    if (!this.cam || !this._vp) return;
    const W = this._vp.clientWidth || window.innerWidth, H = this._vp.clientHeight || window.innerHeight;
    const fullW = W * 1.42;
    this.cam.aspect = fullW / H;
    this.cam.setViewOffset(fullW, H, W * 0.40, 0, W, H);
    this.cam.updateProjectionMatrix();
  }
  onResize() {
    if (!this.renderer) return;
    const el = this._vp;
    const w = el.clientWidth || window.innerWidth, h = el.clientHeight || window.innerHeight;
    this.renderer.setSize(w, h);
    this.applyViewOffset();
  }

  // ============ EDGE GEOMETRY ============
  cuboidEdges(sx, sy, sz) {
    const hx = sx / 2, hy = sy / 2, hz = sz / 2, edges = [];
    const Z = [
      [[1, 0, 0], [0, 1, 0], 'RIGHT-BACK', [hx, hy, 0]],
      [[-1, 0, 0], [0, 1, 0], 'LEFT-BACK', [-hx, hy, 0]],
      [[1, 0, 0], [0, -1, 0], 'RIGHT-FRONT', [hx, -hy, 0]],
      [[-1, 0, 0], [0, -1, 0], 'LEFT-FRONT', [-hx, -hy, 0]],
    ];
    for (const [u, v, n, m] of Z) edges.push({ name: n, axis: 'Z', outU: u, outV: v, mid: m, length: sz });
    const Y = [
      [[1, 0, 0], [0, 0, 1], 'RIGHT-TOP', [hx, 0, hz]],
      [[-1, 0, 0], [0, 0, 1], 'LEFT-TOP', [-hx, 0, hz]],
      [[1, 0, 0], [0, 0, -1], 'RIGHT-BOTTOM', [hx, 0, -hz]],
      [[-1, 0, 0], [0, 0, -1], 'LEFT-BOTTOM', [-hx, 0, -hz]],
    ];
    for (const [u, v, n, m] of Y) edges.push({ name: n, axis: 'Y', outU: u, outV: v, mid: m, length: sy });
    const X = [
      [[0, 1, 0], [0, 0, 1], 'BACK-TOP', [0, hy, hz]],
      [[0, -1, 0], [0, 0, 1], 'FRONT-TOP', [0, -hy, hz]],
      [[0, 1, 0], [0, 0, -1], 'BACK-BOTTOM', [0, hy, -hz]],
      [[0, -1, 0], [0, 0, -1], 'FRONT-BOTTOM', [0, -hy, -hz]],
    ];
    for (const [u, v, n, m] of X) edges.push({ name: n, axis: 'X', outU: u, outV: v, mid: m, length: sx });
    return edges;
  }

  // ============ BUILD GROUP ============
  buildGroup(shape) {
    const THREE = this.THREE;
    if (shape.group) { this.scene.remove(shape.group); this.disposeGroup(shape.group); }
    const g = new THREE.Group();
    g.position.set(shape.pos[0], shape.pos[1], shape.pos[2]);

    // edges list (local)
    shape.edges = shape.type === 'cuboid'
      ? this.cuboidEdges(shape.dims.x, shape.dims.y, shape.dims.z)
      : this.cylinderEdges(shape.dims.r, shape.dims.h);

    // solid (with CSG treatments)
    const solid = this.buildSolid(shape);
    solid.castShadow = true; solid.receiveShadow = true;
    g.add(solid); shape.solid = solid;

    // wire edges (faint), from base outline
    const baseGeom = shape.type === 'cuboid'
      ? new THREE.BoxGeometry(shape.dims.x, shape.dims.y, shape.dims.z)
      : this.cylBase(shape.dims.r, shape.dims.h);
    const wire = new THREE.LineSegments(new THREE.EdgesGeometry(baseGeom, 25), this.lineMat);
    g.add(wire); baseGeom.dispose();

    // proxies for picking
    shape.proxies = [];
    for (const e of shape.edges) {
      const proxy = this.makeEdgeProxy(shape, e);
      g.add(proxy); shape.proxies.push(proxy);
    }

    g.userData.shapeId = shape.id;
    this.scene.add(g);
    shape.group = g;
  }

  buildSolid(shape) {
    const THREE = this.THREE;
    if (shape.type === 'cylinder') return this.buildCylinderSolid(shape);
    const base = new THREE.BoxGeometry(shape.dims.x, shape.dims.y, shape.dims.z);

    const treats = Object.entries(shape.treatments || {});
    if (!treats.length || !this.CSG) {
      const m = new THREE.Mesh(base, this.matFor(shape));
      return m;
    }
    try {
      const { Brush, Evaluator, SUBTRACTION } = this.CSG;
      if (!this._ev) this._ev = new Evaluator();
      let result = new Brush(base);
      result.updateMatrixWorld();
      for (const [name, t] of treats) {
        const e = shape.edges.find(x => x.name === name);
        if (!e) continue;
        const mg = this.cuboidMaskGeom(e, t);
        if (!mg) continue;
        const mb = new Brush(mg); mb.updateMatrixWorld();
        result = this._ev.evaluate(result, mb, SUBTRACTION);
        mg.dispose();
      }
      base.dispose();
      const mesh = new THREE.Mesh(result.geometry, this.matFor(shape));
      return mesh;
    } catch (err) {
      console.warn('CSG cut failed, showing base solid', err);
      return new THREE.Mesh(base, this.matFor(shape));
    }
  }

  matFor(shape) { return shape.id === this.state.selectedShapeId ? this.selMat : this.solidMat; }

  cylBase(r, h) {
    const g = new this.THREE.CylinderGeometry(r, r, h, this.state.fn);
    g.rotateX(Math.PI / 2); // Y-axis -> Z-axis
    return g;
  }
  cylinderEdges(r, h) {
    return [
      { name: 'TOP', kind: 'rim', which: 'top', r, h, length: 2 * Math.PI * r },
      { name: 'BOTTOM', kind: 'rim', which: 'bottom', r, h, length: 2 * Math.PI * r },
    ];
  }

  // ---- cylinder cross-section profile (radius x, height y) with rounded/chamfered rims ----
  cylProfile(R, h, tr) {
    const hh = h / 2;
    const top = tr.TOP, bot = tr.BOTTOM;
    const seg = Math.max(4, Math.round(this.state.fn / 4));
    const clamp = (v) => Math.max(0.2, Math.min(v, R - 0.2, hh - 0.2));
    const pts = [];
    pts.push([0, -hh]);
    if (bot) {
      const r = clamp(bot.size);
      if (bot.type === 'chamfer') { pts.push([R - r, -hh]); pts.push([R, -hh + r]); }
      else { for (let i = 0; i <= seg; i++) { const a = -Math.PI / 2 + (Math.PI / 2) * (i / seg); pts.push([R - r + r * Math.cos(a), (-hh + r) + r * Math.sin(a)]); } }
    } else { pts.push([R, -hh]); }
    if (top) {
      const r = clamp(top.size);
      if (top.type === 'chamfer') { pts.push([R, hh - r]); pts.push([R - r, hh]); }
      else { for (let i = 0; i <= seg; i++) { const a = (Math.PI / 2) * (i / seg); pts.push([R - r + r * Math.cos(a), (hh - r) + r * Math.sin(a)]); } }
    } else { pts.push([R, hh]); }
    pts.push([0, hh]);
    return pts;
  }
  buildCylinderSolid(shape) {
    const THREE = this.THREE;
    const pts = this.cylProfile(shape.dims.r, shape.dims.h, shape.treatments || {});
    const v2 = pts.map(p => new THREE.Vector2(p[0], p[1]));
    const geom = new THREE.LatheGeometry(v2, this.state.fn);
    geom.rotateX(Math.PI / 2);
    geom.computeVertexNormals();
    return new THREE.Mesh(geom, this.matFor(shape));
  }

  // ---- cuboid mask: square-minus-(circle|triangle) extruded along edge, placed by basis ----
  cuboidMaskGeom(e, t) {
    const THREE = this.THREE;
    const r = t.size;
    const shp = new THREE.Shape();
    if (t.type === 'fillet') {
      shp.moveTo(r, 0); shp.lineTo(r, r); shp.lineTo(0, r); shp.absarc(0, 0, r, Math.PI / 2, 0, true);
    } else {
      shp.moveTo(r, 0); shp.lineTo(r, r); shp.lineTo(0, r); shp.closePath();
    }
    const geom = new THREE.ExtrudeGeometry(shp, { depth: e.length + 0.02, bevelEnabled: false, curveSegments: Math.max(6, Math.round(this.state.fn / 3)) });
    geom.translate(0, 0, -(e.length + 0.02) / 2);
    geom.applyMatrix4(this.edgeMatrix(e, r));
    return geom;
  }

  edgeMatrix(e, r) {
    const THREE = this.THREE;
    const U = new THREE.Vector3().fromArray(e.outU);
    const V = new THREE.Vector3().fromArray(e.outV);
    const E = new THREE.Vector3().crossVectors(U, V).normalize();
    const p = new THREE.Vector3().fromArray(e.mid).addScaledVector(U, -r).addScaledVector(V, -r);
    return new THREE.Matrix4().makeBasis(U, V, E).setPosition(p);
  }

  // ---- cylinder rim mask via lathe (revolve sliver) ----
  cylMaskGeom(e, t) {
    const THREE = this.THREE;
    const r = t.size, R = e.r, H = e.h, top = e.which === 'top';
    const zc = top ? H / 2 : -H / 2;          // rim height
    const ic = top ? zc - r : zc + r;          // inner-circle height center
    const pts = [];
    if (t.type === 'fillet') {
      pts.push(new THREE.Vector2(R - r, zc));
      pts.push(new THREE.Vector2(R, zc));
      pts.push(new THREE.Vector2(R, ic));
      const seg = Math.max(6, Math.round(this.state.fn / 3));
      for (let i = 0; i <= seg; i++) {
        const a = (top ? 0 : Math.PI) + (top ? 1 : -1) * (Math.PI / 2) * (i / seg);
        pts.push(new THREE.Vector2(R - r + r * Math.cos(a), ic + r * Math.sin(a)));
      }
    } else {
      pts.push(new THREE.Vector2(R - r, zc));
      pts.push(new THREE.Vector2(R, zc));
      pts.push(new THREE.Vector2(R, ic));
    }
    const geom = new THREE.LatheGeometry(pts, this.state.fn);
    geom.rotateX(Math.PI / 2); // lathe Y-axis -> Z-axis
    return geom;
  }

  makeEdgeProxy(shape, e) {
    const THREE = this.THREE;
    let mesh;
    if (e.kind === 'rim') {
      const g = new THREE.TorusGeometry(e.r, 1.4, 8, Math.max(24, this.state.fn));
      mesh = new THREE.Mesh(g, this.proxyMat());
      mesh.position.z = e.which === 'top' ? e.h / 2 : -e.h / 2;
    } else {
      const U = new THREE.Vector3().fromArray(e.outU);
      const V = new THREE.Vector3().fromArray(e.outV);
      const E = new THREE.Vector3().crossVectors(U, V).normalize();
      const g = new THREE.CylinderGeometry(1.5, 1.5, e.length, 6);
      mesh = new THREE.Mesh(g, this.proxyMat());
      const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), E);
      mesh.quaternion.copy(q);
      mesh.position.fromArray(e.mid);
    }
    mesh.userData = { kind: 'edgeProxy', shapeId: shape.id, edgeName: e.name };
    mesh.renderOrder = 2;
    return mesh;
  }
  proxyMat() {
    if (!this._proxyMat) this._proxyMat = new this.THREE.MeshBasicMaterial({ visible: false });
    return this._proxyMat;
  }

  disposeGroup(g) {
    g.traverse(o => { if (o.geometry) o.geometry.dispose(); });
  }

  // ============ POINTER / PICK ============
  ndc(e) {
    const r = this.renderer.domElement.getBoundingClientRect();
    this.pointer.set(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
  }
  allProxies() { const a = []; for (const s of this.shapes) for (const p of (s.proxies || [])) a.push(p); return a; }
  allSolids() { return this.shapes.map(s => s.solid).filter(Boolean); }

  onPointerMove(e) {
    if (!this.raycaster) return;
    if (this.tc && this.tc.dragging) return;
    this.ndc(e);
    this.raycaster.setFromCamera(this.pointer, this.cam);
    const hit = this.raycaster.intersectObjects(this.allProxies(), false)[0];
    if (this.state.tool === 'select' && hit) {
      this.setHoverEdge(hit.object.userData);
      this.renderer.domElement.style.cursor = 'pointer';
    } else {
      this.setHoverEdge(null);
      this.renderer.domElement.style.cursor = 'default';
    }
  }

  onPointerDown(e) {
    if (e.button !== 0 || !this.raycaster) return;
    if (this.tc && (this.tc.dragging || this.tc.axis)) return; // grabbing the gizmo
    this.ndc(e);
    this.raycaster.setFromCamera(this.pointer, this.cam);

    // select tool: edges first, then shapes
    const ep = this.raycaster.intersectObjects(this.allProxies(), false)[0];
    if (ep) { this.selectEdge(ep.object.userData); return; }
    const sp = this.raycaster.intersectObjects(this.allSolids(), false)[0];
    if (sp) { this.clearEdge(); this.selectShape(this.shapeIdFromObject(sp.object)); return; }
    // empty space
    this.clearEdge(); this.selectShape(null);
  }

  onPointerUp() {}

  shapeIdFromObject(o) {
    let cur = o;
    while (cur) { if (cur.userData && cur.userData.shapeId) return cur.userData.shapeId; cur = cur.parent; }
    return null;
  }

  // ============ HOVER / SELECT EDGE ============
  setHoverEdge(ud) {
    const key = ud ? ud.shapeId + '|' + ud.edgeName : null;
    if (key === this._hoverKey) return;
    this._hoverKey = key;
    if (this.hoverTube) { this.scene.remove(this.hoverTube); this.disposeGroup(this.hoverTube); this.hoverTube = null; }
    if (ud) {
      const sel = this.state.selectedEdge;
      if (sel && sel.shapeId === ud.shapeId && sel.edgeName === ud.edgeName) return;
      this.hoverTube = this.makeHighlight(ud, 0x6aa0ee, 0.55);
      if (this.hoverTube) this.scene.add(this.hoverTube);
    }
  }

  makeHighlight(ud, color, opacity) {
    const THREE = this.THREE;
    const shape = this.shapes.find(s => s.id === ud.shapeId);
    if (!shape) return null;
    const e = shape.edges.find(x => x.name === ud.edgeName);
    if (!e) return null;
    let mesh;
    if (e.kind === 'rim') {
      const g = new THREE.TorusGeometry(e.r, 0.9, 10, Math.max(40, this.state.fn));
      mesh = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color, transparent: true, opacity }));
      mesh.position.set(shape.pos[0], shape.pos[1], shape.pos[2] + (e.which === 'top' ? e.h / 2 : -e.h / 2));
    } else {
      const U = new THREE.Vector3().fromArray(e.outU);
      const V = new THREE.Vector3().fromArray(e.outV);
      const E = new THREE.Vector3().crossVectors(U, V).normalize();
      const g = new THREE.CylinderGeometry(0.85, 0.85, e.length, 10);
      mesh = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color, transparent: true, opacity }));
      const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), E);
      mesh.quaternion.copy(q);
      mesh.position.set(shape.pos[0] + e.mid[0], shape.pos[1] + e.mid[1], shape.pos[2] + e.mid[2]);
    }
    mesh.renderOrder = 4;
    return mesh;
  }

  selectEdge(ud) {
    const shape = this.shapes.find(s => s.id === ud.shapeId);
    const e = shape && shape.edges.find(x => x.name === ud.edgeName);
    if (!e) return;
    if (this.hoverTube) { this.scene.remove(this.hoverTube); this.disposeGroup(this.hoverTube); this.hoverTube = null; this._hoverKey = null; }
    if (this.selTube) { this.scene.remove(this.selTube); this.disposeGroup(this.selTube); this.selTube = null; }
    this.selTube = this.makeHighlight(ud, 0x3b82f6, 0.95);
    if (this.selTube) this.scene.add(this.selTube);
    const existing = (shape.treatments || {})[e.name];
    this.setState({
      selectedEdge: { shapeId: ud.shapeId, edgeName: e.name, label: e.name },
      selectedShapeId: ud.shapeId,
      treatType: existing ? existing.type : this.state.treatType,
      radius: existing ? existing.size : this.state.radius,
    }, () => { this.refreshSelectionMat(); this.updateGizmo(); });
  }

  clearEdge() {
    if (this.selTube) { this.scene.remove(this.selTube); this.disposeGroup(this.selTube); this.selTube = null; }
    if (this.state.selectedEdge) this.setState({ selectedEdge: null }, () => this.updateGizmo());
    else this.updateGizmo();
  }

  // ============ TRANSFORM GIZMO ============
  updateGizmo() {
    if (!this.tc) return;
    const s = (!this.state.selectedEdge && this.state.selectedShapeId)
      ? this.shapes.find(x => x.id === this.state.selectedShapeId) : null;
    if (s && s.group) {
      this.tc.setMode(this.state.gizmoMode === 'scale' ? 'scale' : 'translate');
      this.tc.setSpace(this.state.gizmoMode === 'scale' ? 'local' : 'world');
      this.tc.attach(s.group);
      this.tc.visible = true; this.tc.enabled = true;
    } else {
      this.tc.detach(); this.tc.visible = false;
    }
  }
  onGizmoChange() {
    const s = this.selShape(); if (!s || !this.tc || !this.tc.object) return;
    if (this.state.gizmoMode !== 'scale') {
      s.pos = [+s.group.position.x.toFixed(2), +s.group.position.y.toFixed(2), +s.group.position.z.toFixed(2)];
      this.regenCode(); this.forceUpdate();
    }
  }
  onGizmoEnd() {
    const s = this.selShape(); if (!s) return;
    if (this.state.gizmoMode === 'scale') {
      const sc = s.group.scale;
      if (s.type === 'cuboid') {
        s.dims.x = Math.max(1, +(s.dims.x * sc.x).toFixed(2));
        s.dims.y = Math.max(1, +(s.dims.y * sc.y).toFixed(2));
        s.dims.z = Math.max(1, +(s.dims.z * sc.z).toFixed(2));
      } else {
        const rs = (Math.abs(sc.x) + Math.abs(sc.y)) / 2;
        s.dims.r = Math.max(0.5, +(s.dims.r * rs).toFixed(2));
        s.dims.h = Math.max(1, +(s.dims.h * sc.z).toFixed(2));
      }
      s.group.scale.set(1, 1, 1);
      this.rebuildShape(s);
    } else {
      this.regenCode(); this.forceUpdate();
    }
  }
  setGizmoMove = () => { this.setState({ gizmoMode: 'translate' }, () => this.updateGizmo()); };
  setGizmoScale = () => { this.setState({ gizmoMode: 'scale' }, () => this.updateGizmo()); };

  // ============ TREATMENTS ============
  applyTreatment() {
    const se = this.state.selectedEdge; if (!se) return;
    const shape = this.shapes.find(s => s.id === se.shapeId); if (!shape) return;
    shape.treatments = shape.treatments || {};
    const maxR = this.edgeMaxRadius(shape, se.edgeName);
    const size = Math.min(this.state.radius, maxR);
    shape.treatments[se.edgeName] = { type: this.state.treatType, size };
    this.buildGroup(shape);
    // re-make selection highlight (group rebuilt)
    this.selectEdgeAfterRebuild(se);
    this.syncShapesState(); this.regenCode();
  }
  selectEdgeAfterRebuild(se) {
    if (this.selTube) { this.scene.remove(this.selTube); this.disposeGroup(this.selTube); this.selTube = null; }
    this.selTube = this.makeHighlight({ shapeId: se.shapeId, edgeName: se.edgeName }, 0x3b82f6, 0.95);
    if (this.selTube) this.scene.add(this.selTube);
  }
  edgeMaxRadius(shape, name) {
    if (shape.type === 'cuboid') return Math.max(0.5, Math.min(shape.dims.x, shape.dims.y, shape.dims.z) / 2 - 0.5);
    return Math.max(0.5, Math.min(shape.dims.r, shape.dims.h / 2) - 0.5);
  }
  removeTreatmentBtn = () => {
    const se = this.state.selectedEdge; if (!se) return;
    const shape = this.shapes.find(s => s.id === se.shapeId); if (!shape) return;
    if (shape.treatments) delete shape.treatments[se.edgeName];
    this.buildGroup(shape);
    this.selectEdgeAfterRebuild(se);
    this.syncShapesState(); this.regenCode();
  };
  appliedType() {
    const se = this.state.selectedEdge; if (!se) return null;
    const s = this.shapes.find(x => x.id === se.shapeId);
    return (s && s.treatments && s.treatments[se.edgeName]) ? s.treatments[se.edgeName].type : null;
  }
  setFillet = () => { if (this.appliedType() === 'fillet') { this.removeTreatmentBtn(); return; } this.setState({ treatType: 'fillet' }, () => this.applyTreatment()); };
  setChamfer = () => { if (this.appliedType() === 'chamfer') { this.removeTreatmentBtn(); return; } this.setState({ treatType: 'chamfer' }, () => this.applyTreatment()); };
  shapeHasTreatment(se) { const s = this.shapes.find(x => x.id === se.shapeId); return !!(s && s.treatments && s.treatments[se.edgeName]); }
  onRadiusSlide = (e) => { const v = Math.max(0.5, parseFloat(e.target.value) || 0.5); const se = this.state.selectedEdge; const has = se && this.shapeHasTreatment(se); this.setState({ radius: v }, () => { if (has) this.applyTreatment(); }); };
  onRadiusInput = (e) => { const v = Math.max(0.5, parseFloat(e.target.value) || 0.5); const se = this.state.selectedEdge; const has = se && this.shapeHasTreatment(se); this.setState({ radius: v }, () => { if (has) this.applyTreatment(); }); };

  // ---- shape dimension / position editing ----
  selShape() { return this.shapes.find(s => s.id === this.state.selectedShapeId); }
  setDim = (key, val) => {
    const s = this.selShape(); if (!s) return;
    const v = Math.max(1, parseFloat(val) || 1);
    if (s.type === 'cuboid') { if (key === 'x' || key === 'y' || key === 'z') s.dims[key] = v; }
    else { if (key === 'd') s.dims.r = v / 2; else if (key === 'h') s.dims.h = v; }
    this.rebuildShape(s);
  };
  setPos = (i, val) => {
    const s = this.selShape(); if (!s) return;
    const v = parseFloat(val); if (isNaN(v)) return;
    s.pos[i] = v; s.group.position.set(s.pos[0], s.pos[1], s.pos[2]);
    this.afterMove(s);
  };
  placeOnFloor = () => {
    const s = this.selShape(); if (!s) return;
    s.pos[2] = (s.type === 'cuboid' ? s.dims.z : s.dims.h) / 2;
    s.group.position.set(s.pos[0], s.pos[1], s.pos[2]);
    this.afterMove(s);
  };
  rebuildShape(s) {
    for (const [n, t] of Object.entries(s.treatments || {})) { const mx = this.edgeMaxRadius(s, n); if (t.size > mx) t.size = mx; }
    this.buildGroup(s);
    const se = this.state.selectedEdge;
    if (se && se.shapeId === s.id) this.selectEdgeAfterRebuild(se);
    this.updateGizmo();
    this.syncShapesState(); this.regenCode();
    this.forceUpdate();
  }
  afterMove(s) {
    const se = this.state.selectedEdge;
    if (se && se.shapeId === s.id) this.selectEdgeAfterRebuild(se);
    this.updateGizmo();
    this.syncShapesState(); this.regenCode();
    this.forceUpdate();
  }

  // ============ ADD / SELECT / DELETE SHAPES ============
  nextPos() {
    const n = this.shapes.length;
    const ring = [[0, 0], [55, 0], [-55, 0], [0, 55], [0, -55], [55, 55], [-55, -55]];
    const p = ring[n % ring.length];
    return [p[0], p[1], 0];
  }

  addCuboid = () => {
    if (!this.scene) return;
    this.seq.cuboid++;
    const dims = { x: 40, y: 40, z: 40 };
    const pos = this.nextPos(); pos[2] = dims.z / 2;
    const shape = { id: 'cb' + Date.now() + this.seq.cuboid, type: 'cuboid', label: 'Cuboid ' + this.seq.cuboid, dims, pos, treatments: {} };
    this.shapes.push(shape);
    this.buildGroup(shape);
    this.selectShape(shape.id);
    this.setState({ tool: 'select' });
    this.syncShapesState(); this.regenCode();
  };
  addCylinder = () => {
    if (!this.scene) return;
    this.seq.cylinder++;
    const dims = { r: 20, h: 50 };
    const pos = this.nextPos(); pos[2] = dims.h / 2;
    const shape = { id: 'cy' + Date.now() + this.seq.cylinder, type: 'cylinder', label: 'Cylinder ' + this.seq.cylinder, dims, pos, treatments: {} };
    this.shapes.push(shape);
    this.buildGroup(shape);
    this.selectShape(shape.id);
    this.setState({ tool: 'select' });
    this.syncShapesState(); this.regenCode();
  };

  selectShape = (id) => {
    this.setState({ selectedShapeId: id }, () => { this.refreshSelectionMat(); this.updateGizmo(); });
  };
  refreshSelectionMat() {
    for (const s of this.shapes) {
      if (s.solid) s.solid.material = this.matFor(s);
    }
    this.syncShapesState();
  }
  deleteShapeById = (id) => {
    const i = this.shapes.findIndex(s => s.id === id); if (i < 0) return;
    const s = this.shapes[i];
    if (this.tc && this.tc.object === s.group) this.tc.detach();
    this.scene.remove(s.group); this.disposeGroup(s.group);
    this.shapes.splice(i, 1);
    if (this.state.selectedShapeId === id) this.setState({ selectedShapeId: null }, () => this.updateGizmo());
    if (this.state.selectedEdge && this.state.selectedEdge.shapeId === id) this.clearEdge();
    this.syncShapesState(); this.regenCode();
  };
  deleteSelected = () => { if (this.state.selectedShapeId) this.deleteShapeById(this.state.selectedShapeId); };

  // ============ STATE MIRROR ============
  syncShapesState() {
    const list = this.shapes.map(s => ({
      id: s.id, type: s.type, label: s.label,
      treated: Object.keys(s.treatments || {}).length,
      meta: s.type === 'cuboid'
        ? `${s.dims.x}\u00d7${s.dims.y}\u00d7${s.dims.z}`
        : `\u2300${s.dims.r * 2} \u00d7 ${s.dims.h}`,
    }));
    this.setState({ shapes: list });
  }

  // ============ OPENSCAD CODE GEN ============
  fmt(n) { const v = Math.abs(n) < 1e-9 ? 0 : +(+n).toFixed(4); return String(v); }
  matStr(M) {
    const e = M.elements;
    const rows = [
      [e[0], e[4], e[8], e[12]],
      [e[1], e[5], e[9], e[13]],
      [e[2], e[6], e[10], e[14]],
      [0, 0, 0, 1],
    ];
    return '[' + rows.map(r => '[' + r.map(n => this.fmt(n)).join(', ') + ']').join(', ') + ']';
  }

  regenCode() {
    const F = (n) => this.fmt(n);
    let out = [];
    out.push('// Generated by SCAD Studio');
    out.push('$fn = ' + this.state.fn + ';');
    out.push('');
    let usesMask = false;
    for (const s of this.shapes) if (Object.keys(s.treatments || {}).length && s.type === 'cuboid') usesMask = true;
    if (usesMask) {
      out.push('// --- edge treatment masks (subtracted along a computed edge frame) ---');
      out.push('module edge_fillet(L, r)  { linear_extrude(height = L, center = true) difference() { square([r, r]); circle(r); } }');
      out.push('module edge_chamfer(L, r) { linear_extrude(height = L, center = true) polygon([[r,0],[r,r],[0,r]]); }');
      out.push('');
    }
    for (const s of this.shapes) {
      out.push('// ' + s.label);
      const treats = Object.entries(s.treatments || {});
      const pos = `[${F(s.pos[0])}, ${F(s.pos[1])}, ${F(s.pos[2])}]`;
      if (s.type === 'cylinder') {
        if (treats.length) out.push('// rims: ' + treats.map(([k, t]) => k.toLowerCase() + ' ' + t.type + ' r=' + F(t.size)).join(', '));
        out.push(`translate(${pos})`);
        out.push('  ' + this.cylinderScad(s) + ';');
      } else if (!treats.length) {
        out.push(`translate(${pos})`);
        out.push('  ' + this.baseCall(s) + ';');
      } else {
        out.push(`translate(${pos})`);
        out.push('difference() {');
        out.push('  ' + this.baseCall(s) + ';');
        for (const [name, t] of treats) {
          const e = s.edges.find(x => x.name === name);
          if (!e) continue;
          const M = this.edgeMatrix(e, t.size);
          const mod = t.type === 'fillet' ? 'edge_fillet' : 'edge_chamfer';
          out.push(`  // ${name} (${t.type} r=${F(t.size)})`);
          out.push(`  multmatrix(${this.matStr(M)})`);
          out.push(`    ${mod}(${F(e.length + 0.02)}, ${F(t.size)});`);
        }
        out.push('}');
      }
      out.push('');
    }
    const code = out.join('\n');
    this.setState({ code, dirty: false });
    if (this._codeArea && document.activeElement !== this._codeArea) this._codeArea.value = code;
  }

  baseCall(s) {
    if (s.type === 'cuboid') return `cube([${this.fmt(s.dims.x)}, ${this.fmt(s.dims.y)}, ${this.fmt(s.dims.z)}], center = true)`;
    return `cylinder(h = ${this.fmt(s.dims.h)}, r = ${this.fmt(s.dims.r)}, center = true)`;
  }
  cylinderScad(s) {
    const pts = this.cylProfile(s.dims.r, s.dims.h, s.treatments || {});
    const poly = pts.map(p => `[${this.fmt(p[0])}, ${this.fmt(p[1])}]`).join(', ');
    return `rotate_extrude()\n    polygon([${poly}])`;
  }

  // ============ CODE -> MODEL (base solids; tolerant of our own format) ============
  runCode = () => {
    const txt = (this._codeArea ? this._codeArea.value : this.state.code) || '';
    const parsed = this.parseScad(txt);
    if (!parsed.length) { this.flashStatus('No cube()/cylinder() found'); return; }
    // wipe and rebuild
    for (const s of this.shapes) { this.scene.remove(s.group); this.disposeGroup(s.group); }
    this.shapes = []; this.seq = { cuboid: 0, cylinder: 0 };
    this.clearEdge(); this.setState({ selectedShapeId: null });
    for (const p of parsed) {
      if (p.type === 'cuboid') { this.seq.cuboid++; }
      else this.seq.cylinder++;
      const shape = { id: p.type + Date.now() + Math.random().toString(36).slice(2, 6), type: p.type,
        label: (p.type === 'cuboid' ? 'Cuboid ' : 'Cylinder ') + (p.type === 'cuboid' ? this.seq.cuboid : this.seq.cylinder),
        dims: p.dims, pos: p.pos, treatments: {} };
      this.shapes.push(shape); this.buildGroup(shape);
    }
    this.syncShapesState(); this.regenCode();
    this.flashStatus('Model rebuilt from code');
  };

  parseScad(txt) {
    const shapes = [];
    const clean = txt.replace(/\/\/[^\n]*/g, '');
    const re = /translate\(\s*\[([^\]]*)\]\s*\)[\s\S]*?(cube\(\s*\[([^\]]*)\]|cylinder\(([^)]*)\))/g;
    let m;
    while ((m = re.exec(clean)) !== null) {
      const pos = m[1].split(',').map(x => parseFloat(x.trim()) || 0);
      while (pos.length < 3) pos.push(0);
      if (m[3] !== undefined) {
        const d = m[3].split(',').map(x => parseFloat(x.trim()) || 0);
        shapes.push({ type: 'cuboid', dims: { x: d[0] || 10, y: d[1] || 10, z: d[2] || 10 }, pos });
      } else {
        const args = m[4];
        const h = this.argVal(args, 'h') ?? 10;
        let r = this.argVal(args, 'r');
        if (r == null) { const dd = this.argVal(args, 'd'); r = dd != null ? dd / 2 : 10; }
        shapes.push({ type: 'cylinder', dims: { r, h }, pos });
      }
    }
    // also catch bare cube/cylinder without translate
    const bare = clean.replace(re, '');
    const reB = /(cube\(\s*\[([^\]]*)\]|cylinder\(([^)]*)\))/g;
    while ((m = reB.exec(bare)) !== null) {
      if (m[2] !== undefined) {
        const d = m[2].split(',').map(x => parseFloat(x.trim()) || 0);
        shapes.push({ type: 'cuboid', dims: { x: d[0] || 10, y: d[1] || 10, z: d[2] || 10 }, pos: [0, 0, (d[2] || 10) / 2] });
      } else {
        const args = m[3];
        const h = this.argVal(args, 'h') ?? 10;
        let r = this.argVal(args, 'r');
        if (r == null) { const dd = this.argVal(args, 'd'); r = dd != null ? dd / 2 : 10; }
        shapes.push({ type: 'cylinder', dims: { r, h }, pos: [0, 0, h / 2] });
      }
    }
    return shapes;
  }
  argVal(args, key) {
    const m = new RegExp(key + '\\s*=\\s*(-?[0-9.]+)').exec(args);
    return m ? parseFloat(m[1]) : null;
  }

  onCodeChange = (e) => { this.setState({ code: e.target.value, dirty: true }); };
  copyCode = () => {
    const t = this._codeArea ? this._codeArea.value : this.state.code;
    if (navigator.clipboard) navigator.clipboard.writeText(t).then(() => this.flashStatus('Copied'));
  };
  flashStatus(msg) { this.setState({ statusMsg: msg }); clearTimeout(this._st); this._st = setTimeout(() => this.setState({ statusMsg: null }), 1800); }

  // ============ FILE IO ============
  openFile = () => { if (this._fileInput) this._fileInput.click(); };
  onFileChosen = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      this.setState({ code: f.name, dirty: false });
      if (this._codeArea) this._codeArea.value = rd.result;
      this.setState({ code: rd.result }, () => this.runCode());
    };
    rd.readAsText(f);
    e.target.value = '';
  };
  saveFile = () => {
    const txt = this._codeArea ? this._codeArea.value : this.state.code;
    const blob = new Blob([txt], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'model.scad';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    this.flashStatus('Saved model.scad');
  };

  // ============ TOOLS / UI ============
  pickSelect = () => this.setState({ tool: 'select' });
  pickMove = () => this.setState({ gizmoMode: 'translate', tool: 'select' }, () => this.updateGizmo());
  toggleDrawer = () => this.setState({ drawerOpen: !this.state.drawerOpen });

  onKey(e) {
    if (e.target && (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT')) return;
    const k = e.key.toLowerCase();
    if (k === 'v') this.pickSelect();
    else if (k === 'b') this.addCuboid();
    else if (k === 'c') this.addCylinder();
    else if (k === 'm') this.pickMove();
    else if (k === 'delete' || k === 'backspace') this.deleteSelected();
    else if (k === 'escape') { this.clearEdge(); this.selectShape(null); }
  }

  // ============ RENDER VALUES ============
  toolBtn(active) {
    return `display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:9px;border:1px solid ${active ? '#2C4D78' : 'transparent'};background:${active ? '#1C3251' : 'transparent'};color:${active ? '#79AEF5' : '#9AA3AE'};cursor:pointer;transition:background .12s,color .12s;`;
  }
  tab(active) {
    return `display:flex;align-items:center;gap:7px;flex:1;justify-content:center;padding:8px;border-radius:8px;font:inherit;font-size:12px;cursor:pointer;border:1px solid ${active ? '#2C4D78' : '#2C3037'};background:${active ? '#1C3251' : '#1A1D22'};color:${active ? '#9CC2F5' : '#9AA3AE'};`;
  }

  renderVals() {
    const st = this.state;
    const sel = st.selectedEdge;
    const shapesList = st.shapes.map(s => ({
      label: s.label,
      meta: s.meta + (s.treated ? '  \u00b7  ' + s.treated + ' edge' + (s.treated > 1 ? 's' : '') : ''),
      onSelect: () => { this.clearEdge(); this.selectShape(s.id); },
      onDelete: (ev) => { ev.stopPropagation(); this.deleteShapeById(s.id); },
      rowStyle: `display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer;margin-bottom:2px;border:1px solid ${s.id === st.selectedShapeId ? '#2C4D78' : 'transparent'};background:${s.id === st.selectedShapeId ? '#17283f' : 'transparent'};`,
      dotStyle: `width:9px;height:9px;border-radius:${s.type === 'cylinder' ? '50%' : '2px'};background:${s.id === st.selectedShapeId ? '#3B82F6' : '#6B7280'};`,
    }));

    let radiusMax = 20;
    const selShapeObj = sel ? this.shapes.find(x => x.id === sel.shapeId) : null;
    if (selShapeObj) radiusMax = this.edgeMaxRadius(selShapeObj, sel.edgeName);
    const applied = (sel && selShapeObj && selShapeObj.treatments) ? selShapeObj.treatments[sel.edgeName] : null;
    const ssh = st.selectedShapeId ? this.shapes.find(x => x.id === st.selectedShapeId) : null;
    const sshIsCyl = !!ssh && ssh.type === 'cylinder';

    const drawerW = 420;
    const drawerStyle = `position:absolute;top:0;bottom:0;right:0;width:${drawerW}px;z-index:28;display:flex;flex-direction:column;background:rgba(18,20,24,.94);backdrop-filter:blur(16px);border-left:1px solid #23272E;box-shadow:-12px 0 40px rgba(0,0,0,.4);transform:translateX(${st.drawerOpen ? '0' : drawerW + 'px'});transition:transform .28s cubic-bezier(.4,0,.2,1);`;
    const drawerTab = `position:absolute;top:50%;right:${st.drawerOpen ? drawerW : 0}px;transform:translateY(-50%);z-index:29;display:flex;align-items:center;justify-content:center;width:26px;height:54px;border-radius:9px 0 0 9px;border:1px solid #2C3037;border-right:none;background:rgba(27,30,35,.9);backdrop-filter:blur(12px);color:#9AA3AE;cursor:pointer;transition:right .28s cubic-bezier(.4,0,.2,1);transform-origin:center;` + (st.drawerOpen ? 'transform:translateY(-50%) rotate(180deg);' : '');

    return {
      setViewport: this.setViewport,
      setCodeArea: this.setCodeArea,
      setFileInput: this.setFileInput,
      notReady: !st.ready,

      btnSelect: this.toolBtn(st.tool === 'select'),
      btnCuboid: this.toolBtn(false),
      btnCylinder: this.toolBtn(false),
      btnMove: this.toolBtn(st.gizmoMode === 'translate' && !!st.selectedShapeId && !sel),
      btnDelete: this.toolBtn(false),
      pickSelect: this.pickSelect, addCuboid: this.addCuboid, addCylinder: this.addCylinder,
      pickMove: this.pickMove, deleteSelected: this.deleteSelected,

      hasEdge: !!sel,
      edgeLabel: sel ? sel.label : '',
      filletTab: this.tab(!!applied && applied.type === 'fillet'),
      chamferTab: this.tab(!!applied && applied.type === 'chamfer'),
      setFillet: this.setFillet, setChamfer: this.setChamfer,
      sizeLabel: (applied ? applied.type : 'fillet') === 'chamfer' ? 'Size' : 'Radius',
      radius: applied ? applied.size : st.radius,
      radiusMax,
      hasApplied: !!applied,
      onRadiusInput: this.onRadiusInput, onRadiusSlide: this.onRadiusSlide,
      removeTreatmentBtn: this.removeTreatmentBtn,
      clearEdge: () => this.clearEdge(),

      hasShapePanel: !!st.selectedShapeId && !sel,
      shapePanelLabel: ssh ? ssh.label : '',
      shapeDotStyle: `width:10px;height:10px;border-radius:${sshIsCyl ? '50%' : '2px'};background:#3B82F6;box-shadow:0 0 8px rgba(59,130,246,.6);`,
      moveTab: this.tab(st.gizmoMode !== 'scale'),
      scaleTab: this.tab(st.gizmoMode === 'scale'),
      setGizmoMove: this.setGizmoMove,
      setGizmoScale: this.setGizmoScale,
      isCuboidSel: !!ssh && ssh.type === 'cuboid',
      isCylinderSel: sshIsCyl,
      dimX: ssh && ssh.type === 'cuboid' ? ssh.dims.x : 0,
      dimY: ssh && ssh.type === 'cuboid' ? ssh.dims.y : 0,
      dimZ: ssh && ssh.type === 'cuboid' ? ssh.dims.z : 0,
      cylDia: sshIsCyl ? ssh.dims.r * 2 : 0,
      cylH: sshIsCyl ? ssh.dims.h : 0,
      posX: ssh ? ssh.pos[0] : 0,
      posY: ssh ? ssh.pos[1] : 0,
      posZ: ssh ? ssh.pos[2] : 0,
      onDimX: (e) => this.setDim('x', e.target.value),
      onDimY: (e) => this.setDim('y', e.target.value),
      onDimZ: (e) => this.setDim('z', e.target.value),
      onCylDia: (e) => this.setDim('d', e.target.value),
      onCylH: (e) => this.setDim('h', e.target.value),
      onPosX: (e) => this.setPos(0, e.target.value),
      onPosY: (e) => this.setPos(1, e.target.value),
      onPosZ: (e) => this.setPos(2, e.target.value),
      placeOnFloor: this.placeOnFloor,
      deselectShape: () => this.selectShape(null),

      shapesList,
      isEmpty: shapesList.length === 0,
      shapeCount: shapesList.length,

      statusHint: st.statusMsg || (sel ? 'Edge selected \u2014 click fillet or chamfer (again to remove)' : (st.selectedShapeId ? 'Drag the gizmo to ' + (st.gizmoMode === 'scale' ? 'resize' : 'move') + ' \u00b7 or type exact values' : 'Hover an edge \u00b7 click to treat it')),
      fnVal: st.fn,

      drawerStyle, drawerTab,
      toggleDrawer: this.toggleDrawer,
      code: st.code,
      onCodeChange: this.onCodeChange,
      runCode: this.runCode, copyCode: this.copyCode,
      openFile: this.openFile, saveFile: this.saveFile, onFileChosen: this.onFileChosen,
      dirtyDot: st.dirty ? 'width:7px;height:7px;border-radius:50%;background:#E0A33B;box-shadow:0 0 8px #E0A33B;' : 'width:0;height:0;',
      csgBadge: st.csgOk
        ? 'color:#5E8C6A;'
        : 'color:#C58A3B;',
      csgText: st.csgOk ? '\u25cf live CSG preview' : '\u25cf code-only (CSG offline)',
      codeMeta: (st.code ? st.code.split('\n').length : 0) + ' lines',
    };
  }
}
</script>
</body>
</html>
