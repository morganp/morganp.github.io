<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Rudiments — All 40</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0c0a08;
    --surface:   #141109;
    --card:      #1a170f;
    --border:    #2c2820;
    --text:      #d8cfb4;
    --muted:     #6b6250;
    --accent:    #e8a020;
    --rolls:     #4a9eff;
    --diddles:   #ff9b7a;
    --flams:     #e8a020;
    --drags:     #7ec87e;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(232,160,32,0.04) 0%, transparent 70%);
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 50;
    padding: 18px 32px;
    background: rgba(12,10,8,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 24px;
  }
  .site-title {
    font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--text);
  }
  .site-title span { color: var(--accent); }
  .progress-wrap {
    margin-left: auto;
    display: flex; align-items: center; gap: 12px;
  }
  .progress-text {
    font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .progress-text strong { color: var(--accent); }
  .progress-bar-outer {
    width: 120px; height: 4px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── HERO ── */
  .hero {
    padding: 64px 32px 48px;
    max-width: 900px;
  }
  .hero h1 {
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 700; letter-spacing: -1.5px;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 14px;
  }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p {
    font-size: 17px; color: var(--muted); max-width: 520px;
    line-height: 1.6;
  }

  /* ── CATEGORY NAV ── */
  .cat-nav {
    padding: 0 32px 48px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .cat-pill {
    padding: 8px 18px; border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px; font-weight: 500;
    cursor: pointer; text-decoration: none;
    transition: all 0.15s ease;
    display: flex; align-items: center; gap: 7px;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--text); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── MAIN CONTENT ── */
  main { padding: 0 32px 80px; max-width: 1400px; }

  /* ── CATEGORY SECTION ── */
  .category-section { margin-bottom: 72px; }
  .cat-header {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .cat-stripe {
    width: 4px; min-height: 56px; border-radius: 2px;
    flex-shrink: 0; margin-top: 2px;
  }
  .cat-header-text h2 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
    margin-bottom: 5px;
  }
  .cat-header-text p {
    font-size: 14px; color: var(--muted); line-height: 1.5;
    max-width: 560px;
  }
  .cat-count {
    margin-left: auto; font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted); white-space: nowrap;
    padding-top: 6px;
  }
  .cat-count strong { color: var(--text); }

  /* ── GRID ── */
  .rudiment-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  /* ── CARD ── */
  .rudiment-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px 14px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    display: flex; flex-direction: column; gap: 10px;
    position: relative; overflow: hidden;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  }
  .rudiment-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    border-radius: 10px 10px 0 0;
    opacity: 0; transition: opacity 0.15s;
  }
  .rudiment-card:hover {
    border-color: rgba(232,160,32,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .rudiment-card:hover::before { opacity: 1; }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
  }
  .card-name {
    font-size: 15px; font-weight: 600;
    line-height: 1.3; letter-spacing: -0.2px;
  }
  .card-sticking {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.5px;
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-sticking .r { color: #ff8060; }
  .card-sticking .l { color: #5a9fff; }

  .card-footer {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .learned-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    color: #7ec87e; opacity: 0;
    transition: opacity 0.2s;
  }
  .learned-badge.visible { opacity: 1; }
  .learned-badge svg { width: 13px; height: 13px; }

  .card-arrow {
    font-size: 13px; color: var(--muted);
    transition: transform 0.15s, color 0.15s;
  }
  .rudiment-card:hover .card-arrow {
    transform: translateX(3px); color: var(--accent);
  }

  /* ── RESET PROGRESS ── */
  .footer-bar {
    padding: 32px 32px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    color: var(--muted); font-size: 13px;
  }
  .btn-ghost {
    padding: 7px 14px; border-radius: 6px;
    border: 1px solid var(--border);
    background: none; color: var(--muted);
    font-size: 12px; font-family: 'Space Grotesk', sans-serif;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .hero, .cat-nav, main { padding-left: 16px; padding-right: 16px; }
    .rudiment-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }

  @media print {
    body { background: #fff; color: #000; }
    header, .cat-nav, .footer-bar { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="site-title">Drum<span>.</span>Rudiments</div>
  <div class="progress-wrap">
    <div class="progress-text"><strong id="learnedCount">0</strong> / 40 learned</div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
  </div>
</header>

<div class="hero">
  <h1>The <em>40</em> PAS Drum<br>Rudiments</h1>
  <p>The complete set of International Drum Rudiments as standardized by the Percussive Arts Society. Click any rudiment to open its animated tutorial.</p>
</div>

<div class="cat-nav" id="catNav"></div>
<main id="mainContent"></main>

<div class="footer-bar">
  <span>Progress is saved automatically in your browser.</span>
  <button class="btn-ghost" onclick="resetProgress()">Reset progress</button>
</div>

<script src="rudiments.js"></script>
<script>
  const LEARNED_KEY = 'drum_rudiments_learned';

  function getLearned() {
    try { return new Set(JSON.parse(localStorage.getItem(LEARNED_KEY)) || []); }
    catch { return new Set(); }
  }

  function saveLearned(set) {
    localStorage.setItem(LEARNED_KEY, JSON.stringify([...set]));
  }

  function updateProgress() {
    const learned = getLearned();
    const count = learned.size;
    document.getElementById('learnedCount').textContent = count;
    document.getElementById('progressBar').style.width = (count / 40 * 100) + '%';
    document.querySelectorAll('.learned-badge').forEach(el => {
      const id = parseInt(el.closest('.rudiment-card').dataset.id);
      el.classList.toggle('visible', learned.has(id));
    });
    // Per-category counts
    Object.keys(CATEGORIES).forEach(cat => {
      const total = RUDIMENTS.filter(r => r.category === cat).length;
      const done  = RUDIMENTS.filter(r => r.category === cat && learned.has(r.id)).length;
      const el = document.getElementById('catCount_' + cat);
      if (el) el.innerHTML = `<strong>${done}</strong> / ${total}`;
    });
  }

  function resetProgress() {
    if (confirm('Reset all progress?')) {
      localStorage.removeItem(LEARNED_KEY);
      updateProgress();
    }
  }

  function stickingPreview(pattern) {
    return pattern.slice(0, 8).map(n => {
      const cls = n.h === 'R' ? 'r' : 'l';
      const g = n.grace ? `<span class="${n.grace === 'R' ? 'r' : 'l'}">${n.grace.toLowerCase()}</span>` : '';
      const d = n.drag ? `<span class="${n.h === 'R' ? 'l' : 'r'}">ll</span>` : '';
      return d + g + `<span class="${cls}">${n.h}</span>`;
    }).join(' ');
  }

  function buildPage() {
    const { RUDIMENTS, CATEGORIES } = window;

    // Category nav pills
    const nav = document.getElementById('catNav');
    Object.entries(CATEGORIES).forEach(([cat, info]) => {
      const a = document.createElement('a');
      a.href = '#cat-' + cat;
      a.className = 'cat-pill';
      a.innerHTML = `<span class="cat-dot" style="background:${info.color}"></span>${cat}`;
      nav.appendChild(a);
    });

    // Category sections
    const main = document.getElementById('mainContent');
    Object.entries(CATEGORIES).forEach(([cat, info]) => {
      const rudiments = RUDIMENTS.filter(r => r.category === cat);
      const section = document.createElement('section');
      section.className = 'category-section';
      section.id = 'cat-' + cat;

      section.innerHTML = `
        <div class="cat-header">
          <div class="cat-stripe" style="background:${info.color}"></div>
          <div class="cat-header-text">
            <h2 style="color:${info.color}">${cat}</h2>
            <p>${info.desc}</p>
          </div>
          <div class="cat-count" id="catCount_${cat}">0 / ${rudiments.length}</div>
        </div>
        <div class="rudiment-grid" id="grid_${cat}"></div>
      `;
      main.appendChild(section);

      const grid = section.querySelector('.rudiment-grid');
      rudiments.forEach(r => {
        const card = document.createElement('a');
        card.className = 'rudiment-card';
        card.href = 'rudiment.html?id=' + r.id;
        card.dataset.id = r.id;
        card.style.setProperty('--cat-color', info.color);
        card.querySelector
        card.innerHTML = `
          <style>.rudiment-card[data-id="${r.id}"]::before { background: ${info.color}; }</style>
          <div class="card-num">#${String(r.id).padStart(2,'0')}</div>
          <div class="card-name">${r.name}</div>
          <div class="card-sticking">${stickingPreview(r.pattern)}</div>
          <div class="card-footer">
            <div class="learned-badge">
              <svg viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="7" fill="rgba(126,200,126,0.2)" stroke="#7ec87e" stroke-width="1.5"/>
                <path d="M5 8l2 2 4-4" stroke="#7ec87e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Learned
            </div>
            <div class="card-arrow">→</div>
          </div>
        `;
        grid.appendChild(card);
      });
    });

    updateProgress();
  }

  buildPage();

  // Live-update if another tab marks something learned
  window.addEventListener('storage', updateProgress);
</script>
</body>
</html>
